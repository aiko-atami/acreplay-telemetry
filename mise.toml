[settings]
lockfile = true
disable_backends = ["asdf", "vfox"]

[env]
ACRP_CMAKE_CONFIGURE_ARGS = ""
ACRP_CMAKE_CONFIGURE_ARGS_WINDOWS = "-DVCPKG_TARGET_TRIPLET=x64-windows-static"
CMAKE_GENERATOR = "Ninja"
CMAKE_EXPORT_COMPILE_COMMANDS = "1"

[tools]
node = "24"
pnpm = "10"
vp = "latest"

# ── C++ · Configure ──────────────────────────────────────────────────

[tasks."configure:cpp"]
description = "Configure native-debug and refresh compile_commands.json"
dir = "cpp"
run = "cmake --preset native-debug --fresh && cmake -E copy_if_different build/native-debug/compile_commands.json compile_commands.json"
sources = ["CMakeLists.txt", "CMakePresets.json", "vcpkg.json", "**/*.cmake"]
outputs = [
  "build/native-debug/build.ninja",
  "build/native-debug/compile_commands.json",
  "compile_commands.json",
]

[tasks."configure:cpp:release"]
description = "Configure native-release"
dir = "cpp"
run = "cmake --preset native-release --fresh ${ACRP_CMAKE_CONFIGURE_ARGS}"
run_windows = "cmake --preset native-release --fresh %ACRP_CMAKE_CONFIGURE_ARGS_WINDOWS% %ACRP_CMAKE_CONFIGURE_ARGS%"
sources = ["CMakeLists.txt", "CMakePresets.json", "vcpkg.json", "**/*.cmake"]
outputs = ["build/native-release/build.ninja"]

# ── C++ · Build ──────────────────────────────────────────────────────

[tasks."build:cpp"]
description = "Build native-debug"
dir = "cpp"
run = "cmake --build --preset native-debug"
depends = ["configure:cpp"]

[tasks."build:cpp:release"]
description = "Build native-release"
dir = "cpp"
run = "cmake --build --preset native-release"
depends = ["configure:cpp:release"]

[tasks."build:cpp:strict"]
description = "Build native-strict (warnings as errors)"
depends = ["lint:cpp:compile"]

[tasks."build:native"]
description = "Alias → build:cpp"
depends = ["build:cpp"]

# ── C++ · Test ───────────────────────────────────────────────────────

[tasks."test:cpp"]
description = "Run native C++ tests (ASan+UBSan in debug)"
dir = "cpp"
run = "ctest --preset native-debug --output-on-failure"
depends = ["build:cpp"]

# ── C++ · Lint & Format ─────────────────────────────────────────────

[tasks."lint:cpp:format"]
description = "Check C++ formatting (clang-format --dry-run)"
run = "clang-format --dry-run -Werror $(rg --files cpp -g '*.[ch]' -g '*.[ch]pp' -g '*.cc' -g '*.hh' -g '*.hpp')"

[tasks."lint:cpp:compile"]
description = "Build native-strict (warnings as errors)"
dir = "cpp"
run = "cmake --workflow --preset native-strict"
sources = [
  "CMakeLists.txt",
  "CMakePresets.json",
  "vcpkg.json",
  "**/*.cmake",
  "**/*.cpp",
  "**/*.hpp",
  "**/*.cc",
  "**/*.hh",
]
outputs = ["build/native-strict/build.ninja"]

[tasks."lint:cpp:clangd"]
description = "Run clangd diagnostics"
run = "node scripts/lint-clangd-diagnostics.js"
depends = ["configure:cpp"]

[tasks."lint:cpp:tidy"]
description = "Run clang-tidy on C++ sources"
dir = "cpp"
run = "run-clang-tidy -p build/native-debug -extra-arg=-Wno-unknown-warning-option"
depends = ["configure:cpp"]

[tasks."lint:cpp"]
description = "Full C++ lint stack"
depends = ["lint:cpp:format", "lint:cpp:compile", "lint:cpp:clangd", "lint:cpp:tidy"]

[tasks."fix:cpp:format"]
description = "Auto-format C++ sources in place"
run = "clang-format -i $(rg --files cpp -g '*.[ch]' -g '*.[ch]pp' -g '*.cc' -g '*.hh' -g '*.hpp')"

# ── TypeScript ────────────────────────────────────────────────────────

[tasks."build:ts"]
description = "Build TS packages with tsgo"
run = "tsgo -p packages/actelemetry/tsconfig.json && tsgo -p packages/acreplay-wasm/tsconfig.json"

# ── Wasm ─────────────────────────────────────────────────────────────

[tasks."build:wasm"]
description = "Build C++ → Wasm via Emscripten"
dir = "cpp"
run = "emcmake cmake -S . -B build/wasm -G Ninja && cmake --build build/wasm"

[tasks."smoke:wasm"]
description = "Wasm end-to-end smoke test"
run = "node scripts/wasm-e2e-smoke.js"
depends = ["build:wasm", "build:ts"]

[tasks."smoke:worker"]
description = "Worker API smoke test"
run = "node scripts/worker-api-smoke.js"
depends = ["build:ts"]

# ── CI ───────────────────────────────────────────────────────────────

[tasks.ci]
description = "Default local verification set"
depends = ["lint:cpp", "test:cpp", "build:ts"]
