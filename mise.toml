[settings]
lockfile = true
# Keep backend resolution deterministic.
disable_backends = ["asdf", "vfox"]

[env]
CC = "clang"
CXX = "clang++"
CMAKE_GENERATOR = "Ninja"
# For LSP (clangd).
CMAKE_EXPORT_COMPILE_COMMANDS = "1"

[tools]
cmake = "4"
ninja = "1.12"
node = "24"
pnpm = "10"
python = "3.12"
"conda:clang-tools" = "22"

[tasks."lint:cpp:format"]
description = "Check C++ formatting"
run = "clang-format --dry-run -Werror $(rg --files cpp -g '*.[ch]' -g '*.[ch]pp' -g '*.cc' -g '*.hh' -g '*.hpp')"

[tasks."fix:cpp:format"]
description = "Format C++ sources in place"
run = "clang-format -i $(rg --files cpp -g '*.[ch]' -g '*.[ch]pp' -g '*.cc' -g '*.hh' -g '*.hpp')"

[tasks."configure:cpp"]
description = "Configure the native C++ workspace"
dir = "cpp"
outputs = [
  "build/native-debug/build.ninja",
  "build/native-debug/compile_commands.json",
]
run = "cmake --preset native-debug --fresh"
sources = [
  "CMakeLists.txt",
  "CMakePresets.json",
  "**/*.cmake",
]

[tasks."build:cpp"]
description = "Build the native C++ workspace"
dir = "cpp"
run = "cmake --build --preset native-debug"
depends = ["configure:cpp"]

[tasks."build:native"]
description = "Configure and build the native C++ workspace with clang"
depends = ["build:cpp"]

[tasks."test:cpp"]
description = "Run native C++ tests"
dir = "cpp"
run = "ctest --preset native-debug --output-on-failure"

[tasks."lint:cpp:tidy"]
description = "Run the clang-tidy preset build"
dir = "cpp"
outputs = ["build/native-clang-tidy/build.ninja"]
run = "cmake --preset native-clang-tidy --fresh && cmake --build --preset native-clang-tidy"
sources = [
  "CMakeLists.txt",
  "CMakePresets.json",
  "**/*.cmake",
  "**/*.cpp",
  "**/*.hpp",
  "**/*.cc",
  "**/*.hh",
]

[tasks."build:ts"]
description = "Build TypeScript workspace packages"
run = "pnpm build:ts"
env = { PNPM_HOME = ".cache/pnpm", XDG_CACHE_HOME = ".cache/xdg-cache", XDG_DATA_HOME = ".cache/xdg-data" }

[tasks."build:wasm"]
description = "Build the wasm target with the active emsdk/emcmake toolchain"
run = "pnpm build:wasm"
env = { PNPM_HOME = ".cache/pnpm", XDG_CACHE_HOME = ".cache/xdg-cache", XDG_DATA_HOME = ".cache/xdg-data" }

[tasks."smoke:wasm"]
description = "Run the wasm end-to-end smoke test"
run = "node scripts/wasm-e2e-smoke.mjs"

[tasks.ci]
description = "Run the default local verification set"
depends = ["lint:cpp:format", "build:native", "test:cpp", "build:ts"]
