name: C++ CI

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/cpp.yml"
      - "cpp/**"
      - "mise.toml"
      - "mise.lock"
      - "docs/build-and-test.md"
      - "scripts/**"
  pull_request:
    paths:
      - ".github/workflows/cpp.yml"
      - "cpp/**"
      - "mise.toml"
      - "mise.lock"
      - "docs/build-and-test.md"
      - "scripts/**"

permissions:
  contents: read

jobs:
  native:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install native system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y zlib1g-dev

      - name: Set up mise
        uses: jdx/mise-action@v2
        with:
          install: true
          cache: true

      - name: Trust mise config
        run: mise trust

      - name: Install toolchain
        run: mise install

      - name: Check C++ formatting
        run: mise run lint:cpp:format

      - name: Run clangd diagnostics
        run: mise run lint:cpp:clangd

      - name: Build native C++ with warnings as errors
        run: mise run lint:cpp:compile

      - name: Run native tests
        run: mise run test:cpp

      - name: Run clang-tidy
        run: mise run lint:cpp:tidy
